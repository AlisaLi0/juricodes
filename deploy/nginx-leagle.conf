# nginx reverse-proxy for leagle-chat (product: JuriCodex).
#
# Production runs a DEDICATED domain (juricodex.online) serving the app at the
# root, same-origin: the backend on 127.0.0.1:8600 serves both the static
# frontend and the /api/* routes, so requests, cookies and the OAuth callback
# are all first-party. Paste the location below into the HTTPS server block for
# juricodex.online (certbot manages the listen 443 / ssl_certificate lines).
#
# CORS is handled by the FastAPI app (LEAGLE_CORS_ORIGINS). Do NOT add CORS
# headers here or they would duplicate the app's and browsers would reject them.
#
# proxy_buffering off + chunked_transfer_encoding on keep the SSE token stream
# flowing (also fine through Cloudflare).
#
# Behind Cloudflare: the server block MUST restore the real client IP, otherwise
# the backend's per-IP rate limit (LEAGLE_CHAT_MAX_PER_HOUR on /api/chat) sees a
# rotating Cloudflare edge IP per request and never trips. Add to the server { }:
#   include /etc/nginx/snippets/cloudflare-realip.conf;   # set_real_ip_from CF ranges + real_ip_header CF-Connecting-IP
# so $remote_addr (forwarded as X-Real-IP) is the true visitor IP.
#
# Private access (optional): keep the whole app behind HTTP Basic Auth so only
# we can reach it while testing. Create the password file once (keep it safe):
#   PASS=$(head -c 32 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 16); echo "$PASS"
#   htpasswd -nbB leagle "$PASS" > /etc/nginx/.htpasswd-leagle
#   # fallback if apache2-utils is absent:
#   # echo "leagle:$(openssl passwd -apr1 "$PASS")" > /etc/nginx/.htpasswd-leagle
# Remove the two auth_basic lines to open the site publicly (OAuth then guards it).

location / {
    auth_basic "JuriCodex (private)";
    auth_basic_user_file /etc/nginx/.htpasswd-leagle;
    proxy_pass http://127.0.0.1:8600/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    chunked_transfer_encoding on;
}
